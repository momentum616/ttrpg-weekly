<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTRPG Weekly Intelligence</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f6;color:#1a1a18;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
    .card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:2.5rem;max-width:480px;text-align:center;}
    .badge{display:inline-block;background:#EEEDFE;color:#3C3489;font-size:12px;font-weight:600;padding:4px 12px;border-radius:6px;margin-bottom:1.25rem;}
    h1{font-size:22px;font-weight:600;margin-bottom:8px;}
    p{font-size:14px;color:#5a5a56;line-height:1.6;}
    .dot{display:inline-block;width:8px;height:8px;background:#7F77DD;border-radius:50%;margin-right:6px;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Ready to publish</div>
    <h1>TTRPG Weekly Intelligence</h1>
    <p><span class="dot"></span>First issue coming soon. Drop a dated HTML file into <code>/reports</code> to publish.</p>
  </div>
</body>
</html>
